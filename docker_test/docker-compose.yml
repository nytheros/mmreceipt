version: "3.8"

services:
  postgres:
    image: postgres:16
    container_name: mm-postgres
    environment:
      POSTGRES_USER: mmuser
      POSTGRES_PASSWORD: mmuser_password
      POSTGRES_DB: mattermost
    volumes:
      - ./postgres:/var/lib/postgresql/data
    networks:
      - mm-network
    restart: unless-stopped

  mattermost:
    image: mattermost/mattermost-enterprise-edition:10.4
    container_name: mm-server
    depends_on:
      - postgres
    environment:
      MM_USERNAME: mmuser
      MM_PASSWORD: mmuser_password
      MM_DBNAME: mattermost
      MM_SQLSETTINGS_DATASOURCE: postgres://mmuser:mmuser_password@postgres:5432/mattermost?sslmode=disable&connect_timeout=10
      MM_SERVICESETTINGS_SITEURL: http://localhost:8065
      MM_SERVICESETTINGS_ENABLEDEVELOPER: "true"
      MM_PLUGINSETTINGS_ENABLEUPLOADS: "true"
      MM_PLUGINSETTINGS_AUTOMATICPREPACKAGEDPLUGINS: "true"
    volumes:
      - ./mattermost/config:/mattermost/config
      - ./mattermost/data:/mattermost/data
      - ./mattermost/logs:/mattermost/logs
      - ./mattermost/plugins:/mattermost/plugins
      - ./mattermost/client-plugins:/mattermost/client/plugins
    ports:
      - 8065:8065
    networks:
      - mm-network
    restart: unless-stopped

networks:
  mm-network:
    driver: bridge
